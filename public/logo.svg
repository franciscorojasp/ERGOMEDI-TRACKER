<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0fe0e0"/>
      <stop offset="50%" stop-color="#0d7377"/>
      <stop offset="100%" stop-color="#0a4f6e"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9da4"/>
      <stop offset="100%" stop-color="#0b6b7a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedRect">
      <rect x="56" y="56" width="400" height="400" rx="90" ry="90"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Glassmorphism card -->
  <rect x="56" y="56" width="400" height="400" rx="90" ry="90" fill="url(#glassGrad)" stroke="#0fe0e0" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Inner glow border -->
  <rect x="60" y="60" width="392" height="392" rx="87" ry="87" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Medical cross (behind pill) -->
  <g clip-path="url(#roundedRect)" filter="url(#softGlow)">
    <rect x="210" y="140" width="92" height="232" rx="12" fill="url(#crossGrad)" opacity="0.9"/>
    <rect x="140" y="210" width="232" height="92" rx="12" fill="url(#crossGrad)" opacity="0.9"/>
  </g>

  <!-- Cross neon glow -->
  <g clip-path="url(#roundedRect)" filter="url(#glow)" opacity="0.6">
    <rect x="210" y="140" width="92" height="232" rx="12" fill="#0fe0e0"/>
    <rect x="140" y="210" width="232" height="92" rx="12" fill="#0fe0e0"/>
  </g>

  <!-- Pill body (diagonal) -->
  <g clip-path="url(#roundedRect)" transform="rotate(-45, 256, 256)" filter="url(#glow)">
    <!-- Pill left half (dark) -->
    <rect x="156" y="216" width="100" height="80" rx="40" fill="#0a3d5e"/>
    <!-- Pill right half (teal) -->
    <rect x="256" y="216" width="100" height="80" rx="40" fill="url(#pillGrad)"/>
    <!-- Pill divider line -->
    <line x1="256" y1="216" x2="256" y2="296" stroke="#0fe0e0" stroke-width="3" opacity="0.8"/>
    <!-- Pill capsule outline -->
    <rect x="156" y="216" width="200" height="80" rx="40" fill="none" stroke="#0fe0e0" stroke-width="2.5" opacity="0.9"/>
    <!-- Pill highlight -->
    <ellipse cx="220" cy="236" rx="28" ry="10" fill="#ffffff" opacity="0.18"/>
  </g>

  <!-- Top-left corner highlight on glass -->
  <path d="M 96 56 Q 56 56 56 96" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3"/>
</svg>
